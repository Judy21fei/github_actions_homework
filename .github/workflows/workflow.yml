name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

permissions:
  contents: write # Дозволяє кроку build редагувати та пушити зміни в README.md

jobs:
  # --- ЗАВДАННЯ 1 та 2: Тестування та покриття коду ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Step 1.3 - Display Hello Message (Task 1)
        run: echo "Hello, GitHub Actions!"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with pytest and Coverage
        # Флаг --cov-fail-under=70 завалить пайплайн, якщо покриття менше 70%
        run: |
          pytest --cov=myapp --cov-report=html --cov-report=term --cov-fail-under=70 tests/

      - name: Upload coverage report artifact
        if: always() # Завантажує звіт навіть якщо тести впали, для аналізу помилок
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/

  # --- ЗАВДАННЯ 3: Крок збірки та бейдж статусу ---
  build:
    needs: test # Збірка запуститься ТІЛЬКИ якщо тести (job test) пройшли успішно
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Використовуємо токен для запису в репозиторій

      - name: Add Build Status Badge to README
        run: |
          BADGE_MARKDOWN="![CI/CD Pipeline](https://github.com/${{ github.repository }}/actions/workflows/workflow.yml/badge.svg)"

          # Створюємо README.md, якщо його немає
          if [ ! -f README.md ]; then
            touch README.md
          fi

          # Перевіряємо, чи бейдж вже є в файлі
          if grep -q "actions/workflows/workflow.yml/badge.svg" README.md; then
            echo "Бейдж вже є в README.md. Пропускаємо оновлення."
          else
            echo "Бейдж відсутній. Додаємо вгору файлу README.md..."
            # Додаємо бейдж на самий початок файлу
            echo -e "$BADGE_MARKDOWN\n\n$(cat README.md)" > README.md
            
            # Налаштовуємо Git для коміту від імені бота
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            git add README.md
            git commit -m "docs: auto-add workflow status badge to README [skip ci]"
            git push
          fi
