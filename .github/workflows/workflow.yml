name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - develop

permissions:
  contents: write # Дозволяє автоматично комітити та пушити зміни в репозиторій

jobs:
  # --- ЗАВДАННЯ 1 та 2: Тестування та покриття коду ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Step 1.3 - Display Hello Message (Task 1)
        run: echo "Hello, GitHub Actions!"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with pytest and Coverage
        run: |
          python -m pytest --cov=myapp --cov-report=html --cov-report=term --cov-fail-under=70 tests/

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/

  # --- ЗАВДАННЯ 3: Крок збірки та бейдж статусу ---
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Build Status Badge to README
        run: |
          BADGE_MARKDOWN="![CI/CD Pipeline](https://github.com/${{ github.repository }}/actions/workflows/workflow.yml/badge.svg)"

          if [ ! -f README.md ]; then
            touch README.md
          fi

          if grep -q "actions/workflows/workflow.yml/badge.svg" README.md; then
            echo "Бейдж вже є в README.md. Пропускаємо оновлення."
          else
            echo "Бейдж відсутній. Додаємо вгору файлу README.md..."
            echo -e "$BADGE_MARKDOWN\n\n$(cat README.md)" > README.md
          fi

      # Використовуємо офіційний екшн замість ручного "git push"
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-add workflow status badge to README [skip ci]"
          file_pattern: "README.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
